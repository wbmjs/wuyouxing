name: 无忧行自动获取 + 提交到仓库
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      WYH_TOKEN: ${{ secrets.WYH_TOKEN }}
      WYH_BASE_URL: ${{ secrets.WYH_BASE_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装依赖
        run: pip install requests

      - name: 运行脚本
        run: python 无忧行.py

      - name: 复制结果到仓库
        run: |
          cp /tmp/config.yaml config.yaml

      - name: 提交并推送
        uses: EndBug/add-and-commit@v9
        with:
          message: "自动更新配置 $(date '+%Y-%m-%d %H:%M:%S')"
          add: "config.yaml"
