
name: 无忧行自动获取 + 提交到仓库
on:
  schedule:
    - cron: "0 0 */6 * *"  # 每6小时自动跑一次
  workflow_dispatch:       # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 允许自动提交代码
    env:
      WYH_TOKEN: ${{ secrets.WYH_TOKEN }}
      WYH_BASE_URL: ${{ secrets.WYH_BASE_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: 安装依赖
        run: pip install requests

      - name: 运行获取脚本
        run: python 无忧行.py

      - name: 复制结果到仓库根目录
        run: |
          cp /tmp/proxy_list_*.txt proxy_list.txt

      - name: 自动提交并推送到仓库
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "actions@github.com"
          git add proxy_list.txt
          git commit -m "自动更新代理列表 $(date '+%Y-%m-%d %H:%M:%S')"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
